name: promotion-pipeline

on:
  workflow_dispatch:
    inputs:
      model_name:
        required: true
        description: "Model name"
      version:
        required: true
        description: "Model version"
      approval_request_id:
        required: true
        description: "Approval request ID"

jobs:
  pre-promote-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Verify staging + approved + no incidents
        env:
          PLATFORM_API_BASE_URL: ${{ secrets.PLATFORM_API_BASE_URL }}
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
          MODEL_NAME: ${{ github.event.inputs.model_name }}
          VERSION: ${{ github.event.inputs.version }}
          APPROVAL_REQUEST_ID: ${{ github.event.inputs.approval_request_id }}
        run: |
          curl -fsS -H "Authorization: Bearer $PLATFORM_API_TOKEN" \
            "$PLATFORM_API_BASE_URL/api/v1/models/$MODEL_NAME/versions/$VERSION" > model_version.json
          python - <<'PY'
import json
mv = json.load(open('model_version.json','r',encoding='utf-8'))
if str(mv.get('stage')) != 'Staging':
  raise SystemExit('Model is not in Staging stage')
PY
          curl -fsS -H "Authorization: Bearer $PLATFORM_API_TOKEN" \
            "$PLATFORM_API_BASE_URL/api/v1/models/approval-requests/$APPROVAL_REQUEST_ID" > approval.json
          python - <<'PY'
import json
ar = json.load(open('approval.json','r',encoding='utf-8'))
if ar.get('status') != 'approved':
  raise SystemExit('Approval request is not approved')
PY
          curl -fsS -H "Authorization: Bearer $PLATFORM_API_TOKEN" \
            "$PLATFORM_API_BASE_URL/api/v1/incidents?status=open&model_name=$MODEL_NAME" > incidents.json || echo "[]" > incidents.json
          python - <<'PY'
import json
items = json.load(open('incidents.json','r',encoding='utf-8'))
if isinstance(items, dict):
  items = items.get('items', [])
if items:
  raise SystemExit('Open incidents exist, abort promotion')
PY

  promote-production:
    runs-on: ubuntu-latest
    needs: pre-promote-checks
    steps:
      - name: Promote model to production
        env:
          PLATFORM_API_BASE_URL: ${{ secrets.PLATFORM_API_BASE_URL }}
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
          MODEL_NAME: ${{ github.event.inputs.model_name }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer $PLATFORM_API_TOKEN" \
            -H "Content-Type: application/json" \
            "$PLATFORM_API_BASE_URL/api/v1/models/$MODEL_NAME/versions/$VERSION/promote" \
            -d '{"target_stage":"Production","reason":"Manual approval pipeline","notify_team":true}'

  post-promote:
    runs-on: ubuntu-latest
    needs: promote-production
    steps:
      - name: Smoke test inference
        env:
          PLATFORM_API_BASE_URL: ${{ secrets.PLATFORM_API_BASE_URL }}
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
          MODEL_NAME: ${{ github.event.inputs.model_name }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer $PLATFORM_API_TOKEN" \
            -H "Content-Type: application/json" \
            "$PLATFORM_API_BASE_URL/api/v1/inference/smoke-test" \
            -d "{\"model_name\":\"$MODEL_NAME\"}"

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          MODEL_NAME: ${{ github.event.inputs.model_name }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Promotion done: $MODEL_NAME v$VERSION\"}" \
            "$SLACK_WEBHOOK_URL"
