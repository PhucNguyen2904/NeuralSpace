name: rollback-pipeline

on:
  workflow_dispatch:
    inputs:
      model_name:
        required: true
      version:
        required: true
      reason:
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger rollback
        env:
          PLATFORM_API_BASE_URL: ${{ secrets.PLATFORM_API_BASE_URL }}
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
          MODEL_NAME: ${{ github.event.inputs.model_name }}
          VERSION: ${{ github.event.inputs.version }}
          REASON: ${{ github.event.inputs.reason }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer $PLATFORM_API_TOKEN" \
            -H "Content-Type: application/json" \
            "$PLATFORM_API_BASE_URL/api/v1/models/$MODEL_NAME/versions/$VERSION/rollback" \
            -d "{\"reason\":\"$REASON\"}" > rollback_result.json

  verify:
    runs-on: ubuntu-latest
    needs: rollback
    steps:
      - name: Smoke test restored model
        env:
          PLATFORM_API_BASE_URL: ${{ secrets.PLATFORM_API_BASE_URL }}
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
          MODEL_NAME: ${{ github.event.inputs.model_name }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer $PLATFORM_API_TOKEN" \
            -H "Content-Type: application/json" \
            "$PLATFORM_API_BASE_URL/api/v1/inference/smoke-test" \
            -d "{\"model_name\":\"$MODEL_NAME\"}"

      - name: Alert team
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          MODEL_NAME: ${{ github.event.inputs.model_name }}
        run: |
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Rollback completed for model $MODEL_NAME\"}" \
            "$SLACK_WEBHOOK_URL"
