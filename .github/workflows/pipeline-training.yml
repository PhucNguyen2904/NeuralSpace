name: training-pipeline

on:
  workflow_dispatch:
    inputs:
      dataset_version_id:
        description: "Dataset version ID"
        required: true
      model_name:
        description: "Model name"
        required: true
  schedule:
    - cron: "0 2 * * *"

jobs:
  setup:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    outputs:
      dataset_version_id: ${{ steps.vars.outputs.dataset_version_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install dvc[s3]==3.59.2

      - name: Set variables
        id: vars
        env:
          INPUT_DATASET_VERSION_ID: ${{ github.event.inputs.dataset_version_id }}
          DEFAULT_DATASET_VERSION_ID: ${{ vars.DEFAULT_DATASET_VERSION_ID }}
        run: |
          VAL=${INPUT_DATASET_VERSION_ID:-$DEFAULT_DATASET_VERSION_ID}
          echo "dataset_version_id=$VAL" >> "$GITHUB_OUTPUT"

      - name: Configure DVC and pull
        env:
          MINIO_ENDPOINT_URL: ${{ secrets.MINIO_ENDPOINT_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          dvc remote modify minio endpointurl "$MINIO_ENDPOINT_URL"
          dvc remote modify minio access_key_id "$AWS_ACCESS_KEY_ID"
          dvc remote modify minio secret_access_key "$AWS_SECRET_ACCESS_KEY"
          dvc pull -r minio

  train:
    runs-on: ubuntu-latest
    needs: setup
    defaults:
      run:
        working-directory: backend
    outputs:
      mlflow_run_id: ${{ steps.train.outputs.mlflow_run_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Train
        id: train
        env:
          PLATFORM_DATASET_VERSION_ID: ${{ needs.setup.outputs.dataset_version_id }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          PLATFORM_API_BASE_URL: ${{ secrets.PLATFORM_API_BASE_URL }}
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
          PLATFORM_USER_ID: ${{ secrets.PLATFORM_USER_ID }}
          PLATFORM_TEAM_ID: ${{ secrets.PLATFORM_TEAM_ID }}
        run: |
          python scripts/train.py --dataset-version-id "$PLATFORM_DATASET_VERSION_ID" --output run_output.json
          RUN_ID=$(python - <<'PY'
import json
print(json.load(open('run_output.json','r',encoding='utf-8'))['mlflow_run_id'])
PY
)
          echo "mlflow_run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

  evaluate:
    runs-on: ubuntu-latest
    needs: train
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Evaluate vs baseline
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          PLATFORM_API_BASE_URL: ${{ secrets.PLATFORM_API_BASE_URL }}
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
        run: |
          python scripts/evaluate.py --run-id "${{ needs.train.outputs.mlflow_run_id }}" --max-drop 0.05

  register:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: evaluate
    defaults:
      run:
        working-directory: backend
    outputs:
      model_version: ${{ steps.register.outputs.model_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Register model + sync
        id: register
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          PLATFORM_API_BASE_URL: ${{ secrets.PLATFORM_API_BASE_URL }}
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
          MODEL_NAME: ${{ github.event.inputs.model_name || vars.DEFAULT_MODEL_NAME }}
          RUN_ID: ${{ needs.train.outputs.mlflow_run_id }}
        run: |
          python scripts/register_model.py --run-id "$RUN_ID" --model-name "$MODEL_NAME" --output register_output.json
          VERSION=$(python - <<'PY'
import json
print(json.load(open('register_output.json','r',encoding='utf-8'))['model_version'])
PY
)
          echo "model_version=$VERSION" >> "$GITHUB_OUTPUT"

  promote-staging:
    runs-on: ubuntu-latest
    needs: register
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Promote to staging
        env:
          PLATFORM_API_BASE_URL: ${{ secrets.PLATFORM_API_BASE_URL }}
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
          MODEL_NAME: ${{ github.event.inputs.model_name || vars.DEFAULT_MODEL_NAME }}
          MODEL_VERSION: ${{ needs.register.outputs.model_version }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $PLATFORM_API_TOKEN" \
            -H "Content-Type: application/json" \
            "$PLATFORM_API_BASE_URL/api/v1/models/$MODEL_NAME/versions/$MODEL_VERSION/promote" \
            -d '{"target_stage":"Staging","reason":"CI passed","notify_team":false}'
