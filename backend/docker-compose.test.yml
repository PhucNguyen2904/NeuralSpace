version: "3.9"

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloud_ide_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cloud_ide_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  k8s-mock:
    image: mendhak/http-https-echo:34
    environment:
      HTTP_PORT: 8080
    ports:
      - "18080:8080"

  api-test:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres-test:5432/cloud_ide_test
      REDIS_URL: redis://redis-test:6379/0
      KUBERNETES_IN_CLUSTER: "false"
      KUBERNETES_NAMESPACE_PREFIX: "ws-"
      CELERY_TASK_ALWAYS_EAGER: "true"
      CELERY_TASK_EAGER_PROPAGATES: "true"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      k8s-mock:
        condition: service_started

  worker-test:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.workers worker -l info
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres-test:5432/cloud_ide_test
      REDIS_URL: redis://redis-test:6379/0
      KUBERNETES_IN_CLUSTER: "false"
      KUBERNETES_NAMESPACE_PREFIX: "ws-"
      CELERY_TASK_ALWAYS_EAGER: "true"
      CELERY_TASK_EAGER_PROPAGATES: "true"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
