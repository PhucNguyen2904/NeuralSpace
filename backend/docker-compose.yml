version: "3.9"

services:
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: cloud-ide-nginx
    depends_on:
      - api
      - mlflow
      - minio
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend-network

  minio:
    image: minio/minio:latest
    container_name: cloud-ide-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  minio-init:
    image: minio/mc:latest
    container_name: cloud-ide-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/workspace-data || true &&
      mc mb -p local/mlflow-artifacts || true
      "
    restart: "no"
    networks:
      - backend-network

  postgres:
    image: postgres:16-alpine
    container_name: cloud-ide-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloud_ide
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cloud_ide"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  redis:
    image: redis:7-alpine
    container_name: cloud-ide-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    container_name: cloud-ide-mlflow
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    command: >
      sh -c "pip install --no-cache-dir psycopg2-binary==2.9.9 &&
      mlflow server
      --backend-store-uri postgresql://postgres:postgres@postgres:5432/mlflow
      --default-artifact-root s3://mlflow-artifacts
      --host 0.0.0.0
      --port 5000"
    networks:
      - backend-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-ide-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/cloud_ide
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production-min-32-chars-long
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      KUBERNETES_IN_CLUSTER: "false"
      KUBERNETES_NAMESPACE_PREFIX: "ws-"
      JUPYTER_BASE_IMAGE: "registry.platform.com/jupyter-base:latest"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "workspace-data"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
      MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      MAX_WORKSPACES_PER_USER: "2"
      IDLE_TIMEOUT_SECONDS: "1800"
      CORS_ORIGINS: "http://localhost,http://localhost:80,http://localhost:3000"
      COLAB_NOTEBOOK_GITHUB_URL: ""
      COLAB_LAUNCH_TOKEN_EXPIRE_MINUTES: "10"
      COLAB_DATA_URL_EXPIRE_SECONDS: "900"
    volumes:
      - .:/app
      - ../notebooks:/notebooks
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mlflow:
        condition: service_started
    networks:
      - backend-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-ide-worker
    command: celery -A app.workers.celery_app:celery_app worker -l debug -c 4
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/cloud_ide
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production-min-32-chars-long
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      KUBERNETES_IN_CLUSTER: "false"
      KUBERNETES_NAMESPACE_PREFIX: "ws-"
      JUPYTER_BASE_IMAGE: "registry.platform.com/jupyter-base:latest"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "workspace-data"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
      MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      MAX_WORKSPACES_PER_USER: "2"
      IDLE_TIMEOUT_SECONDS: "1800"
    volumes:
      - .:/app
      - ../notebooks:/notebooks
    depends_on:
      - postgres
      - redis
      - minio
      - mlflow
    networks:
      - backend-network

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-ide-beat
    command: celery -A app.workers.celery_app:celery_app beat -l debug
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/cloud_ide
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production-min-32-chars-long
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      KUBERNETES_IN_CLUSTER: "false"
      KUBERNETES_NAMESPACE_PREFIX: "ws-"
      JUPYTER_BASE_IMAGE: "registry.platform.com/jupyter-base:latest"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "workspace-data"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
      MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      MAX_WORKSPACES_PER_USER: "2"
      IDLE_TIMEOUT_SECONDS: "1800"
    volumes:
      - .:/app
      - ../notebooks:/notebooks
    depends_on:
      - postgres
      - redis
      - minio
      - mlflow
    networks:
      - backend-network

  # -----------------------------------------------------------------------
  # Jupyter Lab — dev-only, token fixed để match với frontend config
  # Notebooks được mount từ host: ../notebooks → /home/jovyan/work
  # Khởi động: docker compose up jupyter  (hoặc cùng với toàn bộ stack)
  # -----------------------------------------------------------------------
  jupyter:
    build:
      context: ../jupyter
      dockerfile: Dockerfile
    container_name: cloud-ide-jupyter
    user: root
    environment:
      JUPYTER_TOKEN: NeuralSpace-dev-token
      NB_UID: "1000"
      NB_GID: "100"
      GRANT_SUDO: "yes"
    volumes:
      # Notebooks lưu trên host, persist qua container restart
      - ../notebooks:/home/jovyan/work
    ports:
      - "8888:8888"
    command: >
      bash -c "jupyter lab
      --allow-root
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --ServerApp.token=NeuralSpace-dev-token
      --IdentityProvider.token=NeuralSpace-dev-token
      --ServerApp.root_dir=/home/jovyan/work
      --ServerApp.allow_origin_pat=https?://localhost:[0-9]+
      --ServerApp.allow_credentials=True
      --ServerApp.disable_check_xsrf=True"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/api/status?token=NeuralSpace-dev-token || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

volumes:
  minio_data:
  postgres_data:
  redis_data:

networks:
  backend-network:
    driver: bridge

