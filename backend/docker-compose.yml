services:
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: cloud-ide-nginx
    depends_on:
      api:
        condition: service_started
      mlflow:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend-network

  minio:
    image: minio/minio:latest
    container_name: cloud-ide-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - backend-network

  minio-init:
    image: minio/mc:latest
    container_name: cloud-ide-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/workspace-data || true
      "
    restart: "no"
    networks:
      - backend-network

  postgres:
    image: postgres:16-alpine
    container_name: cloud-ide-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloud_ide
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - backend-network


  redis:
    image: redis:7-alpine
    container_name: cloud-ide-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - backend-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    container_name: cloud-ide-mlflow
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    command: >
      sh -c "python -m pip install --no-cache-dir psycopg2-binary==2.9.9 boto3==1.34.131 &&
      python -m mlflow server
      --backend-store-uri postgresql://postgres:postgres@postgres:5432/cloud_ide
      --default-artifact-root s3://mlflow-artifacts
      --host 0.0.0.0
      --port 5000"
    networks:
      - backend-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-ide-api
    user: "root"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/cloud_ide
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production-min-32-chars-long
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      MINIO_ENDPOINT: "minio:9000"
      MINIO_PUBLIC_ENDPOINT: "${MINIO_PUBLIC_ENDPOINT:-localhost:9000}"
      MINIO_PUBLIC_SECURE: "${MINIO_PUBLIC_SECURE:-false}"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "workspace-data"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
      MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      CORS_ORIGINS: "http://localhost,http://localhost:80,http://localhost:3000"
      PUBLIC_API_BASE_URL: "${PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}"
      COLAB_TEMPLATE_ORGANIZATION: "neuralspace-ai"
      COLAB_TEMPLATE_REPOSITORY: "colab-templates"
      COLAB_TEMPLATE_REF: "${COLAB_TEMPLATE_REF:-7f9422bc397d1c74abef4996cc8655f7f4037afe}"
      COLAB_TEMPLATE_NOTEBOOK_PATH: "notebooks/bootstrap.ipynb"
      COLAB_RUNTIME_TOKEN_EXPIRE_MINUTES: "480"
      COLAB_DATA_URL_EXPIRE_SECONDS: "900"
      DVC_REPO_PATH: "/srv/dvc-repo"
      DVC_REMOTE_NAME: "minio"
      DVC_MANAGED_REPO_ROOT: "/srv/dvc-repos"
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: "safe.directory"
      GIT_CONFIG_VALUE_0: "*"
    volumes:
      - .:/app
      - ./dvc-repo:/srv/dvc-repo
      - ./dvc-repos:/srv/dvc-repos
      - ./storage-configs:/storage-configs
    ports:
      - "8000:8000"
      - "53682:53682"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
      mlflow:
        condition: service_started
    networks:
      - backend-network

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: http api:8000
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - api
    networks:
      - backend-network

volumes:
  minio_data:
  postgres_data:
  redis_data:

networks:
  backend-network:
    driver: bridge
