version: "3.8"

services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql+asyncpg://ml_app_user:ChangeThisInProd_App_123!@postgres:5432/ml_model_store
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - model_data:/data/models
      - ./app:/app/app
      - /tmp/model_downloads:/tmp/model_downloads
    networks:
      - ml_network
    env_file:
      - .env

  worker:
    build: .
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql+asyncpg://ml_app_user:ChangeThisInProd_App_123!@postgres:5432/ml_model_store
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - model_data:/data/models
      - /tmp/model_downloads:/tmp/model_downloads
    networks:
      - ml_network
    env_file:
      - .env

  beat:
    build: .
    command: celery -A app.core.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - redis
      - postgres
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - ml_network
    env_file:
      - .env

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ml_app_user
      POSTGRES_PASSWORD: ChangeThisInProd_App_123!
      POSTGRES_DB: ml_model_store
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../ml_model_store_schema.sql:/docker-entrypoint-initdb.d/01_initial.sql
    networks:
      - ml_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ml_app_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ml_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  model_data:
  postgres_data:
  redis_data:

networks:
  ml_network:
    driver: bridge
