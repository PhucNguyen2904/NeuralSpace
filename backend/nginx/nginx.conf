worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream api_upstream {
    server api:8000;
  }

  upstream mlflow_upstream {
    server mlflow:5000;
  }

  upstream minio_api_upstream {
    server minio:9000;
  }

  upstream minio_console_upstream {
    server minio:9001;
  }

  server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    client_max_body_size 2g;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location = / {
      return 302 /api/docs;
    }

    location /api/ {
      proxy_pass http://api_upstream/;
    }

    location /mlflow/ {
      proxy_set_header X-Forwarded-Prefix /mlflow;
      rewrite ^/mlflow/(.*)$ /$1 break;
      proxy_pass http://mlflow_upstream/;
    }

    location /minio/ {
      proxy_pass http://minio_api_upstream/;
    }

    location /minio-console/ {
      proxy_pass http://minio_console_upstream/;
    }
  }
}
